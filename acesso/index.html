<style>
  * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  :root { --vio:#6d28d9; --vio2:#8b5cf6; --bg:#f3f4fa; --ink:#191e38; --muted:#5f6789; --line:#e2e5f1; }
  html, body { background:var(--bg); }
  body {
    font-family:'Segoe UI',-apple-system,Roboto,system-ui,sans-serif;
    color:var(--ink); min-height:100vh;
    background:
      radial-gradient(700px 420px at 50% -10%, rgba(139,92,246,0.16), transparent 65%),
      var(--bg);
    display:flex; align-items:center; justify-content:center; padding:26px 18px;
  }
  .cofre { width:100%; max-width:380px; text-align:center; }
  .cad { width:64px; height:64px; margin:0 auto 14px; border-radius:20px; display:grid; place-items:center;
    font-size:30px; background:linear-gradient(150deg,var(--vio),#4338ca); box-shadow:0 12px 30px rgba(109,40,217,.35); }
  .badge {
    display:inline-block; font-size:11.5px; font-weight:800; letter-spacing:1.6px;
    text-transform:uppercase; color:var(--vio); background:#ece4fb;
    border:1px solid #d8c8f7; padding:6px 14px; border-radius:999px; margin-bottom:14px;
  }
  h1 { font-size:24px; font-weight:900; line-height:1.15; letter-spacing:-0.5px; }
  h1 span { color:var(--vio); }
  .sub { color:var(--muted); font-size:14px; margin:10px 0 20px; line-height:1.45; }
  .painel {
    background:#fff; border:1px solid var(--line); border-radius:22px;
    padding:22px 20px; box-shadow:0 14px 40px rgba(25,30,56,0.1);
  }
  input {
    width:100%; background:var(--bg); border:1.6px solid var(--line);
    border-radius:14px; color:var(--ink); font-size:18px; font-weight:700;
    padding:16px; outline:none; text-align:center; transition:border-color .15s, box-shadow .15s;
  }
  input::placeholder { color:#a9aec7; font-weight:600; }
  input:focus { border-color:var(--vio); background:#fff; box-shadow:0 0 0 4px rgba(109,40,217,0.12); }
  button {
    width:100%; border:none; border-radius:14px;
    background:linear-gradient(90deg,var(--vio),#4338ca); color:#fff;
    font-size:17px; font-weight:900; padding:17px; margin-top:12px; cursor:pointer;
    box-shadow:0 10px 26px rgba(109,40,217,0.35); transition:transform .08s;
  }
  button:active { transform:scale(0.985); }
  button:disabled { opacity:0.6; cursor:default; }
  .erro {
    display:none; margin-top:14px; font-size:14px; font-weight:600; color:#9a2424;
    background:#fdeaea; border:1px solid #f3c1c1;
    border-radius:12px; padding:12px 14px;
  }
  .naoaluno {
    margin-top:16px; padding:16px 18px; border-radius:16px; text-align:center;
    background:#fff; border:1px solid var(--line);
    font-size:13.5px; color:var(--muted); line-height:1.5;
  }
  .btn-comprar {
    display:flex; align-items:center; justify-content:center; gap:8px;
    margin-top:13px; padding:14px; border-radius:12px;
    background:linear-gradient(135deg,var(--vio),#4338ca); color:#fff;
    font-weight:800; font-size:14.5px; text-decoration:none;
    box-shadow:0 8px 22px rgba(109,40,217,0.3); transition:transform .08s;
  }
  .btn-comprar:active { transform:scale(0.985); }
  footer { margin-top:22px; font-size:13px; color:var(--muted); font-weight:700; }
  footer b { color:var(--vio); }
</style>

        { name:'PBKDF2', salt:b2u(SALT), iterations:ITER, hash:'SHA-256' },
        km, { name:'AES-GCM', length:256 }, false, ['decrypt']);
      var plano=await crypto.subtle.decrypt({ name:'AES-GCM', iv:b2u(IV) }, key, b2u(DADOS));
      var html=new TextDecoder().decode(plano);
      document.open(); document.write(html); document.close();
    }catch(e){
      btn.disabled=false; btn.textContent='Entrar';
      if(!silencioso){ erroEl.style.display='block'; }
      senhaEl.value=''; senhaEl.focus();
    }
  }
  btn.addEventListener('click', function(){ entrar(false); });
  senhaEl.addEventListener('keydown', function(e){ if(e.key==='Enter') entrar(false); });

  // Auto-destrava se vier com a senha no link (?k=SENHA), ex: redirect do Stripe pós-compra
  (function(){
    var k=new URLSearchParams(location.search).get('k');
    if(k){ senhaEl.value=k; entrar(true); }
  })();
</script>
</body>
